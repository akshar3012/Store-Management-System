<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
	margin: 0;
	padding: 0;
	list-style-type: none;
}

ul{
	display: flex;
  background-color: #57b894;
  
	width: 100%;
	height: 4 x; 
	margin: auto;
	max-width: 1400px;
	justify-content: space-between;
	text-align: center;
}
li {
	padding: 1rem 2rem 1.15rem;
  text-transform: uppercase;
  cursor: pointer;
  color: #0c0303;
  font-weight: 600;
	min-width: 80px;
	margin: auto;
}

li:hover {
  background-image: url('https://scottyzen.sirv.com/Images/v/button.png');
  background-size: 100% 100%;
  color: #190384;
  animation: spring 300ms ease-out;
  text-shadow: 0 -1px 0 #ef816c;
	font-weight: bold;
}
li:active {
  transform: translateY(4px);
}

@keyframes spring {
  15% {
    -webkit-transform-origin: center center;
    -webkit-transform: scale(1.2, 1.1);
  }
  40% {
    -webkit-transform-origin: center center;
    -webkit-transform: scale(0.95, 0.95);
  }
  75% {
    -webkit-transform-origin: center center;
    -webkit-transform: scale(1.05, 1);
  }
  100% {
    -webkit-transform-origin: center center;
    -webkit-transform: scale(1, 1);
  }
}

.shameless-plug{
  position: absolute;
  bottom: 10px;
  right: 0;
  padding: 8px 20px;
  color: #ccc;
  text-decoration: none;
}
  </style>
</head>
<body class="bg-gray-900 text-white">
  
  <ul>
	<li>Home</li>
	<li>About</li>
	<li>Gallery</li>
	<li>Contact us</li>
</ul>



  <!-- Background Image + Overlay -->

  <div class="relative min-h-screen flex items-center justify-center bg-cover bg-center" style="background-image: url('https://source.unsplash.com/1600x900/?technology,abstract');">
    <div class="absolute inset-0 bg-black bg-opacity-60"></div>
    


    <!-- Content Box -->
    <div class="relative z-10 text-center p-6 sm:p-10 max-w-2xl bg-white bg-opacity-10 rounded-2xl backdrop-blur-lg shadow-xl">
      <h1 class="text-4xl sm:text-5xl font-bold text-white mb-4">Welcome to Our Store Site</h1>
      <p class="text-lg sm:text-xl text-gray-200 mb-6">We’re glad you’re here. Explore and discover our features.</p>
      <a href="Select.html"  class="inline-block px-6 py-3 text-white bg-blue-600 hover:bg-blue-700 rounded-xl font-semibold transition duration-300">
        Get Started
      </a>
    </div>
  </div>


 
</body>
</html>
